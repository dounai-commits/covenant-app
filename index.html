<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>合租公约</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#130F0A;--bg2:#1E1810;--bg3:#261F15;--bg4:#2E261A;
  --gold:#E8A857;--gold2:#C4853A;--gold-glow:rgba(232,168,87,.18);
  --green:#4CAF7D;--green-bg:rgba(76,175,125,.12);
  --red:#E05C5C;--red-bg:rgba(224,92,92,.12);
  --text:#F0E8DC;--text2:#9E8E78;--text3:#6B5E4E;
  --border:rgba(232,168,87,.12);--border2:rgba(232,168,87,.06);
  --radius:18px;--radius-sm:12px;
  --safe-bottom:env(safe-area-inset-bottom,16px);
}
html,body{height:100%;background:var(--bg);font-family:'Noto Sans SC',system-ui,sans-serif;color:var(--text);overflow:hidden}

/* ─── Page system ─── */
.page{display:none;height:100vh;flex-direction:column;overflow:hidden;animation:pageIn .3s ease both}
.page.active{display:flex}
@keyframes pageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(96px + var(--safe-bottom))}
.scroll::-webkit-scrollbar{display:none}

/* ─── Bottom bar ─── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px calc(12px + var(--safe-bottom));background:linear-gradient(to top,var(--bg) 70%,transparent);display:flex;gap:10px;z-index:50}

/* ─── Buttons ─── */
.btn{flex:1;padding:15px;border-radius:var(--radius);border:none;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--gold);color:var(--bg);box-shadow:0 4px 20px rgba(232,168,87,.3)}
.btn-primary:active{box-shadow:0 2px 8px rgba(232,168,87,.2)}
.btn-ghost{background:var(--bg3);color:var(--gold);border:1px solid var(--border)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ─── Cards ─── */
.card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border2);overflow:hidden;margin-bottom:12px}
.section{padding:0 16px;margin-bottom:4px}
.section-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin:20px 0 10px}

/* ─── Form rows ─── */
.form-row{display:flex;align-items:center;padding:15px 16px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .1s}
.form-row:last-child{border-bottom:none}
.form-row:active{background:var(--bg3)}
.form-label{font-size:13px;color:var(--text2);width:72px;flex-shrink:0}
.form-value{flex:1;font-size:15px;color:var(--text)}
.form-value.ph{color:var(--text3)}
.form-arrow{color:var(--text3);font-size:16px}

/* ──────────────────────────────────────
   P1 — Landing
────────────────────────────────────── */
#p1{background:var(--bg);justify-content:flex-end;padding-bottom:calc(48px + var(--safe-bottom))}
.p1-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.p1-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.25}
.p1-orb-1{width:340px;height:340px;background:var(--gold);top:-80px;left:-60px}
.p1-orb-2{width:260px;height:260px;background:#C4853A;bottom:20%;right:-60px}
.p1-content{position:relative;padding:0 28px;display:flex;flex-direction:column;align-items:center}
.p1-icon{font-size:56px;margin-bottom:16px;filter:drop-shadow(0 0 24px rgba(232,168,87,.5))}
.p1-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--gold);text-align:center;line-height:1.2;margin-bottom:8px;text-shadow:0 0 40px rgba(232,168,87,.3)}
.p1-sub{font-size:14px;color:var(--text2);text-align:center;line-height:1.7;margin-bottom:40px}
.p1-input-wrap{width:100%;margin-bottom:20px;position:relative}
.p1-input{width:100%;padding:16px 20px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius);font-size:16px;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.p1-input::placeholder{color:var(--text3)}
.p1-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
.p1-btns{width:100%;display:flex;flex-direction:column;gap:12px}
.p1-btn{width:100%;padding:16px;border-radius:var(--radius);border:none;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.p1-btn:active{transform:scale(.97)}
.p1-btn:disabled{opacity:.45}
.p1-btn-create{background:var(--gold);color:var(--bg);box-shadow:0 4px 24px rgba(232,168,87,.35)}
.p1-btn-join{background:transparent;color:var(--gold);border:1.5px solid rgba(232,168,87,.4)}

/* ──────────────────────────────────────
   P2 — Circle Home
────────────────────────────────────── */
.circle-hero{background:var(--bg2);padding:24px 20px 20px;border-bottom:1px solid var(--border2);position:relative;overflow:hidden}
.circle-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 10% 50%,rgba(232,168,87,.08) 0%,transparent 70%);pointer-events:none}
.circle-hero-label{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.circle-hero-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--text);margin-bottom:12px}
.invite-chip{display:inline-flex;align-items:center;gap:8px;background:var(--bg3);padding:7px 12px;border-radius:24px;border:1px solid var(--border)}
.invite-code{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:2px}
.copy-btn{background:var(--gold);color:var(--bg);padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer}

.period-tabs{display:flex;gap:6px;padding:16px 16px 4px}
.period-tab{padding:7px 16px;border-radius:24px;font-size:13px;font-weight:600;background:var(--bg3);color:var(--text2);border:1px solid var(--border2);cursor:pointer;transition:all .15s;font-family:inherit}
.period-tab.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}

/* Leaderboard */
.lb-item{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .1s}
.lb-item:last-child{border-bottom:none}
.lb-item:active{background:var(--bg3)}
.lb-rank{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-right:12px;flex-shrink:0}
.r1{background:linear-gradient(135deg,#FFD700,#E8A857);color:var(--bg)}
.r2{background:linear-gradient(135deg,#C0C0C0,#9E9E9E);color:var(--bg)}
.r3{background:linear-gradient(135deg,#CD7F32,#A0522D);color:white}
.rn{background:var(--bg3);color:var(--text3)}
.lb-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:12px;flex-shrink:0;border:1px solid var(--border)}
.lb-info{flex:1}
.lb-name{font-size:15px;font-weight:600;color:var(--text)}
.lb-sub{font-size:12px;color:var(--text3);margin-top:2px}
.lb-score{font-size:22px;font-weight:700;color:var(--gold)}
.lb-score.neg{color:var(--red)}

/* Rules list */
.rule-item{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border2)}
.rule-item:last-child{border-bottom:none}
.rule-dot{width:8px;height:8px;border-radius:50%;margin-right:12px;flex-shrink:0}
.rule-title{flex:1;font-size:14px;color:var(--text)}
.score-chips{display:flex;gap:6px}
.chip{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
.chip-pos{background:var(--green-bg);color:var(--green)}
.chip-neg{background:var(--red-bg);color:var(--red)}

/* ──────────────────────────────────────
   P3 — Record
────────────────────────────────────── */
.p3-header{background:var(--bg2);padding:20px 16px 20px;border-bottom:1px solid var(--border2)}

.type-row{display:flex;gap:10px;padding:16px}
.type-btn{flex:1;padding:20px 8px;border-radius:var(--radius);border:1.5px solid var(--border2);text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2)}
.type-btn:active{transform:scale(.97)}
.type-btn .t-icon{font-size:28px;margin-bottom:6px}
.type-btn .t-label{font-size:14px;font-weight:600;color:var(--text2)}
.type-btn.sel-comply{border-color:var(--green);background:var(--green-bg);box-shadow:0 0 0 1px rgba(76,175,125,.2),inset 0 0 20px rgba(76,175,125,.05)}
.type-btn.sel-comply .t-label{color:var(--green)}
.type-btn.sel-violate{border-color:var(--red);background:var(--red-bg);box-shadow:0 0 0 1px rgba(224,92,92,.2),inset 0 0 20px rgba(224,92,92,.05)}
.type-btn.sel-violate .t-label{color:var(--red)}

.note-ta{width:100%;padding:14px 16px;border:none;font-size:15px;font-family:inherit;resize:none;outline:none;min-height:80px;color:var(--text);background:transparent}
.note-ta::placeholder{color:var(--text3)}

/* ──────────────────────────────────────
   P4 — Add Rule
────────────────────────────────────── */
.p4-header{background:var(--bg2);padding:20px 16px 20px;border-bottom:1px solid var(--border2)}

.score-type-tabs{display:flex;background:var(--bg3);border-radius:var(--radius-sm);padding:4px;margin:0 16px 16px}
.stt{flex:1;padding:10px;border-radius:10px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s;font-family:inherit}
.stt.act-pos{background:var(--bg4);color:var(--green);box-shadow:0 1px 6px rgba(0,0,0,.3)}
.stt.act-neg{background:var(--bg4);color:var(--red);box-shadow:0 1px 6px rgba(0,0,0,.3)}

.score-disp{text-align:center;font-family:'Playfair Display',serif;font-size:52px;font-weight:700;padding:16px 0 20px;letter-spacing:-1px}
.score-disp.pos{color:var(--green);text-shadow:0 0 30px rgba(76,175,125,.3)}
.score-disp.neg{color:var(--red);text-shadow:0 0 30px rgba(224,92,92,.3)}

.score-pills{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:0 16px 16px}
.sp{padding:12px 4px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);text-align:center;font-size:15px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s;background:var(--bg2);font-family:inherit}
.sp:active{transform:scale(.94)}
.sp.sel-pos{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.sp.sel-neg{border-color:var(--red);background:var(--red-bg);color:var(--red)}

/* ──────────────────────────────────────
   P5 — History
────────────────────────────────────── */
.history-hero{background:var(--bg2);padding:20px 20px 24px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:16px;position:relative;overflow:hidden}
.history-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(232,168,87,.06),transparent 70%)}
.history-av{width:56px;height:56px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px;border:1.5px solid var(--border);flex-shrink:0}
.history-info-name{font-size:20px;font-weight:700;color:var(--text)}
.history-info-score{font-size:13px;color:var(--text2);margin-top:4px}

.tl{padding:16px}
.tl-item{display:flex;gap:12px;margin-bottom:8px}
.tl-dot-wrap{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.tl-line{width:2px;flex:1;background:var(--border2);margin:4px auto 0;min-height:16px}
.tl-card{flex:1;background:var(--bg2);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid var(--border2);margin-bottom:4px}
.tl-rule{font-size:14px;font-weight:600;margin-bottom:6px;color:var(--text)}
.tl-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-badge{font-size:12px;padding:3px 9px;border-radius:10px;font-weight:600}
.tl-note{font-size:13px;color:var(--text2);margin-top:6px}
.tl-time,.tl-reporter{font-size:11px;color:var(--text3)}

/* ──────────────────────────────────────
   Page header (shared)
────────────────────────────────────── */
.page-header{display:flex;align-items:center;gap:12px;padding:16px 16px 12px}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text2);cursor:pointer;flex-shrink:0;border:1px solid var(--border2);transition:background .15s}
.back-btn:active{background:var(--bg4)}
.page-title{font-size:17px;font-weight:600;color:var(--text)}

/* ──────────────────────────────────────
   Sheet
────────────────────────────────────── */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;backdrop-filter:blur(4px)}
.sheet-overlay.show{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{width:100%;background:var(--bg2);border-radius:20px 20px 0 0;padding:8px 0 calc(16px + var(--safe-bottom));max-height:70vh;overflow-y:auto;animation:slideUp .25s ease}
.sheet::-webkit-scrollbar{display:none}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 12px}
.sheet-title{text-align:center;font-size:12px;color:var(--text3);letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase}
.sheet-item{padding:15px 24px;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:14px;color:var(--text);transition:background .1s;border-bottom:1px solid var(--border2)}
.sheet-item:last-of-type{border-bottom:none}
.sheet-item:active{background:var(--bg3)}
.sheet-item.sel{color:var(--gold);font-weight:600}
.sheet-cancel{width:calc(100% - 32px);margin:12px 16px 0;padding:14px;border-radius:var(--radius);border:none;background:var(--bg3);color:var(--text2);font-size:16px;font-family:inherit;cursor:pointer;border:1px solid var(--border2)}

/* ──────────────────────────────────────
   Modal
────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex;animation:fadeIn .2s ease}
.modal{background:var(--bg2);border-radius:24px;padding:28px 24px;width:100%;max-width:320px;border:1px solid var(--border);animation:scaleIn .2s ease}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;text-align:center}
.modal-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px;line-height:1.6}
.modal-input{width:100%;padding:16px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:22px;font-family:inherit;outline:none;text-align:center;letter-spacing:6px;font-weight:700;color:var(--text);transition:border-color .2s,box-shadow .2s}
.modal-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-btn{flex:1;padding:14px;border-radius:var(--radius-sm);border:none;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.modal-btn:active{transform:scale(.96)}
.modal-btn-cancel{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
.modal-btn-ok{background:var(--gold);color:var(--bg)}

/* ──────────────────────────────────────
   Utils
────────────────────────────────────── */
.loading{display:flex;align-items:center;justify-content:center;padding:36px;color:var(--text3);gap:10px;font-size:14px}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(30,24,16,.92);color:var(--text);padding:11px 22px;border-radius:24px;font-size:14px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999;border:1px solid var(--border);backdrop-filter:blur(8px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:44px 20px;color:var(--text3)}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:.5}
.empty p{font-size:14px}

/* Rule input */
.rule-input{width:100%;padding:16px;border:none;font-size:15px;font-family:inherit;resize:none;outline:none;color:var(--text);background:transparent}
.rule-input::placeholder{color:var(--text3)}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- ════ P1 · LANDING ════ -->
<div class="page active" id="p1">
  <div class="p1-bg">
    <div class="p1-orb p1-orb-1"></div>
    <div class="p1-orb p1-orb-2"></div>
  </div>
  <div class="p1-content">
    <div class="p1-icon">🕯️</div>
    <div class="p1-title">合租公约</div>
    <div class="p1-sub">与室友、家人、爱人<br>共同守护生活的约定</div>
    <div class="p1-input-wrap">
      <input class="p1-input" id="nickname-input" type="text" placeholder="你叫什么名字？" maxlength="10" autocomplete="off">
    </div>
    <div class="p1-btns">
      <button class="p1-btn p1-btn-create" id="btn-create" onclick="createCircle()">创建新圈子</button>
      <button class="p1-btn p1-btn-join" id="btn-join" onclick="openJoinModal()">加入已有圈子</button>
    </div>
  </div>
</div>

<!-- ════ P2 · CIRCLE HOME ════ -->
<div class="page" id="p2">
  <div class="scroll">
    <div class="circle-hero">
      <div class="circle-hero-label">你的圈子</div>
      <div class="circle-hero-name" id="circle-name-display">加载中…</div>
      <div class="invite-chip">
        <span style="font-size:12px;color:var(--text2)">邀请码</span>
        <span class="invite-code" id="circle-code-display">——</span>
        <span class="copy-btn" onclick="copyCode()">复制</span>
      </div>
    </div>

    <div class="period-tabs">
      <button class="period-tab active" onclick="setPeriod(this,'all')">全部</button>
      <button class="period-tab" onclick="setPeriod(this,'day')">今日</button>
      <button class="period-tab" onclick="setPeriod(this,'week')">本周</button>
      <button class="period-tab" onclick="setPeriod(this,'month')">本月</button>
    </div>

    <div class="section">
      <div class="section-title">积分榜</div>
      <div class="card" id="leaderboard"><div class="loading"><div class="spinner"></div>加载中</div></div>
    </div>

    <div class="section">
      <div class="section-title">公约列表</div>
      <div class="card" id="rules-list"><div class="loading"><div class="spinner"></div>加载中</div></div>
    </div>
  </div>
  <div class="bottom-bar">
    <button class="btn btn-ghost" onclick="showPage('p4')">＋ 新增公约</button>
    <button class="btn btn-primary" onclick="showPage('p3')">记录行为</button>
  </div>
</div>

<!-- ════ P3 · RECORD ════ -->
<div class="page" id="p3">
  <div class="scroll">
    <div class="p3-header">
      <div class="page-header">
        <div class="back-btn" onclick="showPage('p2')">‹</div>
        <span class="page-title">记录行为</span>
      </div>
    </div>

    <div class="section" style="margin-top:4px">
      <div class="section-title">行为类型</div>
      <div class="type-row">
        <div class="type-btn" id="type-comply" onclick="selectType('comply')">
          <div class="t-icon">✅</div>
          <div class="t-label">守约</div>
        </div>
        <div class="type-btn" id="type-violate" onclick="selectType('violate')">
          <div class="t-icon">❌</div>
          <div class="t-label">违约</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">记录信息</div>
      <div class="card">
        <div class="form-row" onclick="openSheet('person')">
          <span class="form-label">当事人</span>
          <span class="form-value ph" id="rec-person">请选择成员</span>
          <span class="form-arrow">›</span>
        </div>
        <div class="form-row" onclick="openSheet('rule')">
          <span class="form-label">公约条目</span>
          <span class="form-value ph" id="rec-rule">请选择公约</span>
          <span class="form-arrow">›</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">备注（选填）</div>
      <div class="card">
        <textarea class="note-ta" id="rec-note" placeholder="补充说明…" rows="3"></textarea>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <button class="btn btn-primary" id="btn-submit-rec" onclick="submitRecord()">提交记录</button>
  </div>
</div>

<!-- ════ P4 · ADD RULE ════ -->
<div class="page" id="p4">
  <div class="scroll">
    <div class="p4-header">
      <div class="page-header">
        <div class="back-btn" onclick="showPage('p2')">‹</div>
        <span class="page-title">新增公约</span>
      </div>
    </div>

    <div class="section" style="margin-top:8px">
      <div class="section-title">公约内容</div>
      <div class="card">
        <input type="text" id="rule-title" class="rule-input" placeholder="如「饭后洗碗」「准时回家」" maxlength="30">
      </div>
    </div>

    <div class="section">
      <div class="section-title">分值设置</div>
      <div class="score-type-tabs">
        <button class="stt act-pos" id="stt-reward" onclick="setScoreType('reward')">🌟 守约奖励</button>
        <button class="stt" id="stt-punish" onclick="setScoreType('punish')">💀 违约惩罚</button>
      </div>
      <div class="score-disp pos" id="score-disp">+3</div>
      <div class="score-pills" id="score-pills"></div>
    </div>
  </div>
  <div class="bottom-bar">
    <button class="btn btn-primary" id="btn-submit-rule" onclick="submitRule()">添加公约</button>
  </div>
</div>

<!-- ════ P5 · HISTORY ════ -->
<div class="page" id="p5">
  <div class="scroll">
    <div>
      <div class="p4-header">
        <div class="page-header">
          <div class="back-btn" onclick="showPage('p2')">‹</div>
          <span class="page-title">行为记录</span>
        </div>
      </div>
      <div class="history-hero">
        <div class="history-av" id="history-av">😊</div>
        <div>
          <div class="history-info-name" id="history-name">—</div>
          <div class="history-info-score" id="history-sc">积分加载中…</div>
        </div>
      </div>
    </div>
    <div class="tl" id="timeline"></div>
  </div>
</div>

<!-- ════ SHEET ════ -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheetOutside(event)">
  <div class="sheet" id="sheet-inner">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title">请选择</div>
    <div id="sheet-items"></div>
    <button class="sheet-cancel" onclick="closeSheet()">取消</button>
  </div>
</div>

<!-- ════ JOIN MODAL ════ -->
<div class="modal-overlay" id="join-modal" onclick="closeJoinOutside(event)">
  <div class="modal">
    <div class="modal-title">加入圈子</div>
    <div class="modal-sub">输入朋友分享的邀请码<br>一起守护约定</div>
    <input class="modal-input" id="invite-input" type="text" placeholder="XXXXXX" maxlength="6" autocomplete="off">
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="closeJoinModal()">取消</button>
      <button class="modal-btn modal-btn-ok" id="btn-join-ok" onclick="joinCircle()">加入</button>
    </div>
  </div>
</div>

<script>
// ═══ Config ═══
const API = 'http://43.128.92.155:3000/api';
const EMOJIS = ['🌸','😎','🐼','🦊','🐸','🌈','🎮','🦁','🐧','🌻','🍀','🦋','🐨','🦄','🎯','🍜'];

// ═══ State ═══
let s = { nickname:'', emoji:'', myId:null, circleId:null, inviteCode:null, members:[], rules:[] };
let draft = { type:null, personId:null, ruleId:null, scoreType:'reward', scoreVal:3 };
let currentPeriod = 'all';

// ═══ Storage ═══
function saveSession() {
  localStorage.setItem('cov_session', JSON.stringify({
    myId:s.myId, circleId:s.circleId, inviteCode:s.inviteCode,
    nickname:s.nickname, emoji:s.emoji,
  }));
}
function loadSession() {
  try {
    const d = JSON.parse(localStorage.getItem('cov_session') || 'null');
    if (d && d.myId) { Object.assign(s, d); return true; }
  } catch(e) {}
  return false;
}

// ═══ Init ═══
(async function init() {
  if (loadSession()) { await refreshCircle(); showPage('p2'); }
  renderScoreUI();
})();

// ═══ API ═══
async function api(method, path, body) {
  const r = await fetch(API + path, {
    method, headers:{'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || '请求失败');
  return data;
}

// ═══ Nav ═══
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'p2') refreshCircle();
  if (id === 'p3') resetRecord();
  if (id === 'p4') resetRule();
}

// ═══ P1 ═══
function setBtnLoading(ids, loading) {
  ids.forEach(id => { const e = document.getElementById(id); if(e) e.disabled = loading; });
}

async function createCircle() {
  const name = document.getElementById('nickname-input').value.trim();
  if (!name) { showToast('请先输入昵称'); return; }
  setBtnLoading(['btn-create','btn-join'], true);
  try {
    s.nickname = name;
    s.emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    const d = await api('POST', '/circles', {
      circleName: name + '的小窝 🏠',
      nickname: name, emoji: s.emoji,
    });
    Object.assign(s, { myId:d.memberId, circleId:d.circleId, inviteCode:d.inviteCode });
    saveSession();
    showPage('p2');
    showToast('圈子创建成功，快邀请朋友吧 🎉');
  } catch(e) { showToast('创建失败：' + e.message); }
  finally { setBtnLoading(['btn-create','btn-join'], false); }
}

function openJoinModal() {
  if (!document.getElementById('nickname-input').value.trim()) { showToast('请先输入昵称'); return; }
  document.getElementById('invite-input').value = '';
  document.getElementById('join-modal').classList.add('show');
  setTimeout(() => document.getElementById('invite-input').focus(), 300);
}
function closeJoinModal() { document.getElementById('join-modal').classList.remove('show'); }
function closeJoinOutside(e) { if (e.target === document.getElementById('join-modal')) closeJoinModal(); }

async function joinCircle() {
  const name = document.getElementById('nickname-input').value.trim() || s.nickname;
  const code = document.getElementById('invite-input').value.trim().toUpperCase();
  if (!code) { showToast('请输入邀请码'); return; }
  setBtnLoading(['btn-join-ok'], true);
  try {
    s.nickname = name;
    s.emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    const d = await api('POST', '/circles/join', { inviteCode:code, nickname:name, emoji:s.emoji });
    Object.assign(s, { myId:d.memberId, circleId:d.circleId, inviteCode:d.inviteCode });
    saveSession();
    closeJoinModal();
    showPage('p2');
    showToast('已加入圈子 👋');
  } catch(e) { showToast('加入失败：' + e.message); }
  finally { setBtnLoading(['btn-join-ok'], false); }
}

// ═══ P2 ═══
async function refreshCircle() {
  if (!s.inviteCode) return;
  try {
    const d = await api('GET', `/circles/${s.inviteCode}`);
    s.members = d.members; s.rules = d.rules;
    document.getElementById('circle-name-display').textContent = d.circle.name;
    document.getElementById('circle-code-display').textContent = d.circle.invite_code;
    await renderLeaderboard();
    renderRules();
  } catch(e) { showToast('加载失败：' + e.message); }
}

function setPeriod(el, period) {
  document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentPeriod = period;
  renderLeaderboard();
}

async function renderLeaderboard() {
  const lb = document.getElementById('leaderboard');
  lb.innerHTML = '<div class="loading"><div class="spinner"></div>加载中</div>';
  try {
    const d = await api('GET', `/circles/${s.inviteCode}/leaderboard?period=${currentPeriod}`);
    if (!d.leaderboard.length) { lb.innerHTML = empty('👥', '还没有成员'); return; }
    lb.innerHTML = d.leaderboard.map((m, i) => {
      const rc = ['r1','r2','r3','rn'][Math.min(i,3)];
      const rl = i < 3 ? ['🥇','🥈','🥉'][i] : i+1;
      return `<div class="lb-item" onclick="showHistory('${m.id}')">
        <div class="lb-rank ${rc}">${rl}</div>
        <div class="lb-avatar">${m.emoji}</div>
        <div class="lb-info">
          <div class="lb-name">${m.nickname}</div>
          <div class="lb-sub">${m.recordCount} 条记录</div>
        </div>
        <div class="lb-score${m.score < 0 ? ' neg' : ''}">${m.score > 0 ? '+' : ''}${m.score}</div>
      </div>`;
    }).join('');
  } catch(e) { lb.innerHTML = empty('⚠️', '加载失败'); }
}

function renderRules() {
  const rl = document.getElementById('rules-list');
  if (!s.rules.length) { rl.innerHTML = empty('📋', '还没有公约，添加一条吧'); return; }
  const colors = ['#E8A857','#4CAF7D','#E05C5C','#5B8CFF','#C77DFF','#FF9F45'];
  rl.innerHTML = s.rules.map((r, i) =>
    `<div class="rule-item">
      <div class="rule-dot" style="background:${colors[i % colors.length]}"></div>
      <span class="rule-title">${r.title}</span>
      <div class="score-chips">
        <span class="chip chip-pos">+${r.reward}</span>
        <span class="chip chip-neg">${r.punish}</span>
      </div>
    </div>`
  ).join('');
}

function copyCode() {
  const code = s.inviteCode || '';
  try {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(code).catch(()=>{});
    } else {
      const el = document.createElement('textarea');
      el.value = code; el.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(el); el.focus(); el.select();
      document.execCommand('copy'); document.body.removeChild(el);
    }
  } catch(e) {}
  showToast('邀请码已复制：' + code);
}

// ═══ P3 ═══
function resetRecord() {
  draft.type = null; draft.personId = null; draft.ruleId = null;
  document.getElementById('type-comply').className = 'type-btn';
  document.getElementById('type-violate').className = 'type-btn';
  setFormVal('rec-person', '请选择成员', true);
  setFormVal('rec-rule', '请选择公约', true);
  document.getElementById('rec-note').value = '';
}

function selectType(t) {
  draft.type = t;
  document.getElementById('type-comply').className = 'type-btn' + (t==='comply' ? ' sel-comply' : '');
  document.getElementById('type-violate').className = 'type-btn' + (t==='violate' ? ' sel-violate' : '');
  if (draft.ruleId) {
    const rule = s.rules.find(r => r.id === draft.ruleId);
    if (rule) updateRuleLabel(rule);
  }
}

function updateRuleLabel(rule) {
  const score = draft.type === 'comply' ? '+'+rule.reward : ''+rule.punish;
  setFormVal('rec-rule', rule.title + ' (' + score + '分)', false);
}

let sheetTarget = null;
function openSheet(target) {
  sheetTarget = target;
  const title = document.getElementById('sheet-title');
  const items = document.getElementById('sheet-items');
  if (target === 'person') {
    title.textContent = '选择当事人';
    items.innerHTML = s.members.map(m =>
      `<div class="sheet-item${draft.personId===m.id?' sel':''}" onclick="pickItem('person','${m.id}','${m.nickname}','${m.emoji}')">
        <span>${m.emoji}</span><span>${m.nickname}</span>
      </div>`).join('');
  } else {
    title.textContent = '选择公约条目';
    if (!s.rules.length) {
      items.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text3)">还没有公约</div>';
    } else {
      items.innerHTML = s.rules.map(r => {
        const score = draft.type==='comply' ? '+'+r.reward : (draft.type==='violate' ? ''+r.punish : '±');
        const icon = draft.type==='comply' ? '🌟' : (draft.type==='violate' ? '💀' : '📌');
        return `<div class="sheet-item${draft.ruleId===r.id?' sel':''}" onclick="pickItem('rule','${r.id}','${r.title}','')">
          <span>${icon}</span><span>${r.title} (${score}分)</span>
        </div>`;
      }).join('');
    }
  }
  document.getElementById('sheet-overlay').classList.add('show');
}

function pickItem(type, id, label, emoji) {
  if (type === 'person') {
    draft.personId = id;
    setFormVal('rec-person', emoji + ' ' + label, false);
  } else {
    draft.ruleId = id;
    const rule = s.rules.find(r => r.id === id);
    if (rule) updateRuleLabel(rule);
  }
  closeSheet();
}
function closeSheet() { document.getElementById('sheet-overlay').classList.remove('show'); }
function closeSheetOutside(e) { if (e.target === document.getElementById('sheet-overlay')) closeSheet(); }

async function submitRecord() {
  if (!draft.type) { showToast('请选择行为类型'); return; }
  if (!draft.personId) { showToast('请选择当事人'); return; }
  if (!draft.ruleId) { showToast('请选择公约条目'); return; }
  const btn = document.getElementById('btn-submit-rec');
  btn.disabled = true;
  try {
    await api('POST', '/records', {
      circleId:s.circleId, ruleId:draft.ruleId,
      reporterId:s.myId, targetId:draft.personId,
      type:draft.type, note:document.getElementById('rec-note').value.trim(),
    });
    showPage('p2');
    showToast(draft.type==='comply' ? '✅ 守约记录已提交！' : '❌ 违约记录已提交！');
  } catch(e) { showToast('提交失败：' + e.message); }
  finally { btn.disabled = false; }
}

// ═══ P4 ═══
function resetRule() {
  draft.scoreType = 'reward'; draft.scoreVal = 3;
  document.getElementById('rule-title').value = '';
  renderScoreUI();
}
function setScoreType(t) { draft.scoreType = t; draft.scoreVal = 3; renderScoreUI(); }
function renderScoreUI() {
  const isR = draft.scoreType === 'reward';
  document.getElementById('stt-reward').className = 'stt' + (isR ? ' act-pos' : '');
  document.getElementById('stt-punish').className = 'stt' + (!isR ? ' act-neg' : '');
  const d = document.getElementById('score-disp');
  d.className = 'score-disp ' + (isR ? 'pos' : 'neg');
  d.textContent = (isR ? '+' : '−') + draft.scoreVal;
  document.getElementById('score-pills').innerHTML = [1,2,3,5,10].map(v =>
    `<button class="sp${v===draft.scoreVal?(isR?' sel-pos':' sel-neg'):''}" onclick="setScore(${v})">${v}</button>`
  ).join('');
}
function setScore(v) { draft.scoreVal = v; renderScoreUI(); }

async function submitRule() {
  const title = document.getElementById('rule-title').value.trim();
  if (!title) { showToast('请输入公约标题'); return; }
  const btn = document.getElementById('btn-submit-rule');
  btn.disabled = true;
  try {
    await api('POST', '/rules', {
      circleId:s.circleId, memberId:s.myId,
      title, reward:draft.scoreVal, punish:-draft.scoreVal,
    });
    showPage('p2');
    showToast('公约「' + title + '」已添加 ✅');
  } catch(e) { showToast('添加失败：' + e.message); }
  finally { btn.disabled = false; }
}

// ═══ P5 ═══
async function showHistory(memberId) {
  const m = s.members.find(x => x.id === memberId);
  document.getElementById('history-av').textContent = m.emoji;
  document.getElementById('history-name').textContent = m.nickname;
  document.getElementById('history-sc').textContent = '积分加载中…';
  document.getElementById('timeline').innerHTML = '<div class="loading"><div class="spinner"></div>加载中</div>';
  showPage('p5');
  try {
    const d = await api('GET', `/members/${memberId}/records`);
    const score = d.records.reduce((sum, r) => sum + (r.type==='comply' ? r.reward : r.punish), 0);
    document.getElementById('history-sc').textContent = '当前积分：' + (score > 0 ? '+' : '') + score;
    const tl = document.getElementById('timeline');
    if (!d.records.length) { tl.innerHTML = empty('🕊️', '暂无行为记录'); return; }
    tl.innerHTML = d.records.map((rec, i) => {
      const isC = rec.type === 'comply';
      const delta = isC ? '+'+rec.reward : ''+rec.punish;
      return `<div class="tl-item">
        <div class="tl-dot-wrap">
          <div class="tl-dot" style="background:${isC?'var(--green-bg)':'var(--red-bg)'}">${isC?'✅':'❌'}</div>
          ${i < d.records.length-1 ? '<div class="tl-line"></div>' : ''}
        </div>
        <div class="tl-card">
          <div class="tl-rule">${rec.rule_title}</div>
          <div class="tl-meta">
            <span class="tl-badge ${isC?'chip-pos':'chip-neg'}">${isC?'守约':'违约'} ${delta}分</span>
            <span class="tl-time">${fmtTime(rec.created_at)}</span>
          </div>
          ${rec.note ? `<div class="tl-note">💬 ${rec.note}</div>` : ''}
          <div class="tl-reporter" style="margin-top:4px">记录人：${rec.reporter_name}</div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('history-sc').textContent = '加载失败';
    document.getElementById('timeline').innerHTML = empty('⚠️', '加载失败');
  }
}

// ═══ Util ═══
function fmtTime(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return '刚刚';
  if (d < 3600000) return Math.floor(d/60000) + '分钟前';
  if (d < 86400000) return Math.floor(d/3600000) + '小时前';
  return Math.floor(d/86400000) + '天前';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}
function setFormVal(id, text, placeholder) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'form-value' + (placeholder ? ' ph' : '');
}
function empty(icon, text) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><p>${text}</p></div>`;
}
</script>
</body>
</html>
